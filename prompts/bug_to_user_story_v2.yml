  techniques_applied:
    - "Role Prompting: Persona de Product Manager Sênior especialista em metodologias ágeis"
    - "Few-shot Learning: 4 exemplos (2 simples, 1 médio, 1 complexo) com saídas que demonstram o formato esperado"
    - "Chain of Thought (CoT): Processo de análise em 5 etapas antes de gerar a User Story"
  optimization_notes: |
    Melhorias em relação ao v1:
    - Definição clara de persona (Role Prompting)
    - 4 exemplos concretos de entrada/saída (Few-shot)
    - Processo de raciocínio passo a passo (Chain of Thought)
    - Regras explícitas por nível de complexidade (simples, médio, complexo)
    - Formato Given-When-Then para critérios de aceitação
    - Tom profissional e empático com foco em valor de negócio
    - Preservação de contexto técnico relevante
